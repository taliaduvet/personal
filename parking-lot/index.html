<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parking Lot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🅿</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Today's Suggestions (sticky) -->
    <header id="today-bar" class="sticky-bar">
      <div class="today-header">
        <h2>Today's Suggestions</h2>
        <span id="completed-tally" class="tally">Completed today: 0</span>
        <button id="clear-suggestions" class="btn-secondary">Clear suggestions</button>
        <button id="archive-btn" class="btn-secondary">View archive</button>
        <button id="analytics-btn" class="btn-secondary">Analytics</button>
        <button id="sheets-btn" class="btn-secondary">Copy for Sheets</button>
        <button id="export-btn" class="btn-secondary">Export backup</button>
        <input type="file" id="import-input" accept=".json" style="display:none">
        <button id="import-btn" class="btn-secondary">Import</button>
      </div>
      <div id="today-list" class="today-list"></div>
    </header>

    <!-- Main content -->
    <main id="main-content">
      <!-- Overview: 4 columns -->
      <div id="overview" class="overview">
        <div class="columns-header">
          <button id="back-btn" class="btn-back" style="display:none">← Overview</button>
        </div>
        <div id="columns" class="columns"></div>
        <div id="add-to-suggestions-area" class="add-to-suggestions">
          <button id="add-to-suggestions-btn" class="btn-primary" disabled>Add selected to Today's Suggestions</button>
        </div>
      </div>

      <!-- Focus Mode (hidden by default) -->
      <div id="focus-mode" class="focus-mode" style="display:none">
        <div class="focus-content">
          <h1>Your Focus</h1>
          <p id="focus-tally" class="focus-tally">Completed today: 0</p>
          <div id="focus-list" class="focus-list"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Floating buttons -->
  <div class="floating-buttons">
    <button id="focus-btn" class="fab" title="Focus mode">◎</button>
    <button id="add-btn" class="fab fab-primary" title="Add task">+</button>
  </div>

  <!-- Add modal -->
  <div id="add-modal" class="modal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add to parking lot</h3>
        <button id="close-add" class="btn-close">×</button>
      </div>
      <div class="modal-body">
        <div class="add-mode-tabs">
          <button id="tab-single" class="tab active">Single</button>
          <button id="tab-quick" class="tab">Quick add</button>
          <button id="tab-voice" class="tab">Voice</button>
        </div>
        <div id="single-add" class="add-form">
          <div class="input-row">
            <input id="task-input" type="text" placeholder="e.g. misfit invoice due march 15" autocomplete="off">
            <button id="mic-btn" class="btn-icon" title="Voice input">🎤</button>
          </div>
          <div class="add-options">
            <label>Category</label>
            <select id="category-select">
              <option value="misfit">Misfit</option>
              <option value="stop2030barclay">Stop 2030 Barclay</option>
              <option value="cycles">Cycles</option>
              <option value="life">Life</option>
            </select>
            <label>Deadline (optional)</label>
            <input id="deadline-input" type="date">
            <label>Priority <span class="hint-link" id="priority-hint" title="How to decide?">?</span></label>
            <select id="priority-select">
              <option value="critical">Critical</option>
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <button id="submit-single" class="btn-primary">Add</button>
        </div>
        <div id="quick-add" class="add-form" style="display:none">
          <textarea id="quick-input" placeholder="One task per line&#10;misfit invoice&#10;life dentist 3/20&#10;cycles grant report" rows="6"></textarea>
          <button id="submit-quick" class="btn-primary">Add all</button>
        </div>
        <div id="voice-add" class="add-form" style="display:none">
          <p class="voice-hint">Say several tasks, separated by "comma" or "next". Example: "misfit invoice, life dentist, cycles report"</p>
          <button id="voice-multi-btn" class="btn-primary btn-voice">Start speaking</button>
          <div id="voice-transcript" class="voice-transcript"></div>
          <button id="submit-voice" class="btn-primary" disabled>Add all</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit modal -->
  <div id="edit-modal" class="modal" style="display:none">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Edit</h3>
        <button id="close-edit" class="btn-close">×</button>
      </div>
      <div class="modal-body">
        <input id="edit-text" type="text">
        <select id="edit-category"></select>
        <input id="edit-deadline" type="date">
        <select id="edit-priority"></select>
        <button id="save-edit" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Archive modal -->
  <div id="archive-modal" class="modal" style="display:none">
    <div class="modal-content modal-wide">
      <div class="modal-header">
        <h3>Archive — Completed items</h3>
        <button id="close-archive" class="btn-close">×</button>
      </div>
      <div class="modal-body">
        <div id="archive-list" class="archive-list"></div>
      </div>
    </div>
  </div>

  <!-- Analytics panel -->
  <div id="analytics-panel" class="analytics-panel" style="display:none">
    <div class="analytics-content">
      <h3>This week</h3>
      <p id="analytics-text"></p>
      <button id="close-analytics" class="btn-secondary">Close</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
