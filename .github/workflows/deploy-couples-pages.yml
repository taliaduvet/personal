name: Deploy Personal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare build output
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r parking-lot-app deploy/
          echo "const SUPABASE_URL='${{ secrets.SUPABASE_URL }}'; const SUPABASE_ANON_KEY='${{ secrets.SUPABASE_KEY }}';" > deploy/parking-lot-app/config.js
          mkdir -p deploy/accounting-app
          cp accounting-app/index.html accounting-app/styles.css accounting-app/api.js accounting-app/app.js deploy/accounting-app/
          echo "const SUPABASE_URL='${{ secrets.SUPABASE_URL }}'; const SUPABASE_ANON_KEY='${{ secrets.SUPABASE_KEY }}';" > deploy/accounting-app/config.js
          if grep -q "SUPABASE_URL='';" deploy/parking-lot-app/config.js || grep -q "SUPABASE_ANON_KEY='';" deploy/parking-lot-app/config.js; then
            echo "::error::Supabase secrets appear empty. Check repo Settings → Secrets → SUPABASE_URL and SUPABASE_KEY are set."
            exit 1
          fi
          if grep -q "SUPABASE_URL='';" deploy/accounting-app/config.js || grep -q "SUPABASE_ANON_KEY='';" deploy/accounting-app/config.js; then
            echo "::error::Ledger config empty (same secrets as Parking Lot)."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
