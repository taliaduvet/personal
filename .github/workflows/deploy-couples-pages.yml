name: Deploy Personal to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-parking-lot:
    name: Test Parking Lot (Vitest + Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: parking-lot-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: parking-lot-app/package-lock.json
      - run: npm ci
      - run: npm run test
      - run: npx playwright install --with-deps chromium
      # Do not fail the job on e2e flakes; Vitest is the contract gate. Pages deploy still runs via build.if.
      - run: npm run e2e
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: parking-lot-playwright-results
          path: parking-lot-app/test-results/
          if-no-files-found: ignore

  # Deploy even if Parking Lot tests fail so Ledger/Pages are not stuck on an unrelated app.
  build:
    if: ${{ always() && !cancelled() }}
    needs: [test-parking-lot]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare build output
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp -r parking-lot-app deploy/
          echo "const SUPABASE_URL='${{ secrets.SUPABASE_URL }}'; const SUPABASE_ANON_KEY='${{ secrets.SUPABASE_KEY }}';" > deploy/parking-lot-app/config.js
          mkdir -p deploy/accounting-app/js
          cp accounting-app/index.html accounting-app/styles.css accounting-app/api.js accounting-app/app.js deploy/accounting-app/
          cp accounting-app/js/parse-csv.js deploy/accounting-app/js/
          echo "const SUPABASE_URL='${{ secrets.SUPABASE_URL }}'; const SUPABASE_ANON_KEY='${{ secrets.SUPABASE_KEY }}';" > deploy/accounting-app/config.js
          if grep -q "SUPABASE_URL='';" deploy/parking-lot-app/config.js || grep -q "SUPABASE_ANON_KEY='';" deploy/parking-lot-app/config.js; then
            echo "::error::Supabase secrets appear empty. Check repo Settings → Secrets → SUPABASE_URL and SUPABASE_KEY are set."
            exit 1
          fi
          if grep -q "SUPABASE_URL='';" deploy/accounting-app/config.js || grep -q "SUPABASE_ANON_KEY='';" deploy/accounting-app/config.js; then
            echo "::error::Ledger config empty (same secrets as Parking Lot)."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
